<!DOCTYPE html>
<html>
<head>
  <title>Medicine Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>💊 Medicine Tracker</h1>

  <!-- Add Medicine Card -->
  <div class="card">
    <input type="text" id="name" placeholder="Medicine Name">
    <input type="time" id="time">
    <button onclick="addMedicine()">➕ Add Medicine</button>
  </div>

  <!-- Medicines List -->
  <div class="card">
    <h2>📋 Today's Medicines</h2>
    <ul id="list"></ul>
  </div>

  <!-- AI Section -->
  <div class="card">
    <h2>🤖 AI Suggestions</h2>
    <ul id="ai-list"></ul>
    <button onclick="loadAI()">Get Suggestions</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
